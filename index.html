<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Star Maker - 2D Solar System Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  </head>
  <body>
    <div id="app">
      <main id="canvas-pane">
        <div id="canvas-holder" aria-label="Simulation canvas"></div>
        <button id="btn-expand-panel" class="floating-toggle" aria-label="Show control panel">Show Controls</button>
        <div id="status-bar">
          <span id="status-playstate">Paused</span>
          <span>•</span>
          <span id="status-model">Model: Keplerian</span>
          <span>•</span>
          <span id="status-bodies">Bodies: 0</span>
        </div>
      </main>

      <aside id="control-panel" aria-label="Control panel" style="z-index: 30; position: relative;">
        <div class="panel-header">
          <div>
            <h1>Star Maker</h1>
            <p class="subtitle">Interactive 2D solar system simulator</p>
          </div>
          <button id="btn-collapse-panel" class="ghost small" aria-label="Hide control panel">Hide</button>
        </div>

        <section class="card">
          <h2>Simulation Controls</h2>
          <div class="row">
            <button id="btn-toggle">Play</button>
            <button id="btn-step">Step</button>
            <button id="btn-reset" class="danger">Reset</button>
          </div>
          <div class="row">
            <label>
              Physics Model
              <select id="select-model">
                <option value="keplerian">Keplerian (star-only)</option>
                <option value="kepler_exact">Kepler (exact)</option>
                <option value="nbody">Newtonian N-Body</option>
              </select>
            </label>
            <label class="inline" style="margin-left:auto; gap:8px;">
              <input type="checkbox" id="checkbox-audio" />
              Enable Sound
            </label>
            <label class="inline" style="gap:8px;">
              Rhythm
              <select id="select-rhythm">
                <option value="off">Off</option>
                <option value="orbit">Orbit Beat</option>
                <option value="speed">Speed Pulse</option>
                <option value="metronome">Metronome</option>
              </select>
            </label>
            <label class="inline" style="gap:8px;">
              Master Vol
              <input id="range-master-volume" type="range" min="0" max="1" value="0.6" step="0.01" />
              <span id="label-master-volume">0.60</span>
            </label>
            <label class="inline" style="gap:8px;">
              Reverb
              <input type="checkbox" id="checkbox-reverb" />
            </label>
          </div>
          <div class="row">
            <label>
              Tempo (BPM)
              <input id="range-bpm" type="range" min="40" max="180" value="90" step="1" />
              <span id="label-bpm">90</span>
            </label>
          </div>
          <div class="row">
            <label>
              Scale
              <select id="select-scale">
                <option value="off">Off</option>
                <option value="major">Major</option>
                <option value="minor">Minor</option>
                <option value="pentatonic">Pentatonic</option>
              </select>
            </label>
            <label>
              Root
              <select id="select-root">
                <option value="C">C</option>
                <option value="C#">C#</option>
                <option value="D">D</option>
                <option value="Eb">Eb</option>
                <option value="E">E</option>
                <option value="F">F</option>
                <option value="F#">F#</option>
                <option value="G" selected>G</option>
                <option value="Ab">Ab</option>
                <option value="A">A</option>
                <option value="Bb">Bb</option>
                <option value="B">B</option>
              </select>
            </label>
            <label>
              Subdiv
              <select id="select-subdiv">
                <option value="1">1/1</option>
                <option value="2">1/2</option>
                <option value="4" selected>1/4</option>
                <option value="8">1/8</option>
              </select>
            </label>
            <label class="inline" style="gap:8px;">
              Phase by orbit
              <input type="checkbox" id="checkbox-phase-orbit" />
            </label>
          </div>
          <div class="row">
            <button id="btn-center">Center Star</button>
            <button id="btn-fit">Fit All</button>
            <span class="muted">|</span>
            <button id="btn-save">Save</button>
            <button id="btn-load">Load</button>
            <input id="input-file" type="file" accept="application/json" style="display:none" />
          </div>
          <div class="row sliders">
            <label>
              Time Step
              <input id="range-dt" type="range" min="0.01" max="2" value="0.5" step="0.01" />
              <span id="label-dt">0.50</span>
            </label>
            <label>
              Gravity (G)
              <input id="range-g" type="range" min="0.1" max="10" value="2" step="0.1" />
              <span id="label-g">2.0</span>
            </label>
            <label>
              Trail Length
              <input id="range-trail" type="range" min="0" max="400" value="150" step="10" />
              <span id="label-trail">150</span>
            </label>
          </div>
          <div class="row">
            <span class="muted">Presets:</span>
            <button id="preset-solar">Solar Mini</button>
            <button id="preset-binary">Binary Stars</button>
            <button id="preset-ring">Asteroid Ring</button>
            <button id="preset-random">Random System</button>
          </div>
        </section>

        <section class="card">
          <h2>Add Planet</h2>
          <form id="form-add">
            <div class="grid">
              <label>
                Name
                <input id="input-name" type="text" placeholder="Planet X" />
              </label>
              <label>
                Color
                <input id="input-color" type="color" value="#51a7f9" />
              </label>
              <label>
                Timbre
                <select id="input-timbre">
                  <option value="sine">Sine</option>
                  <option value="triangle">Triangle</option>
                  <option value="square">Square</option>
                  <option value="sawtooth">Sawtooth</option>
                  <option value="organ">Organ</option>
                  <option value="bell">Bell</option>
                  <option value="pluck">Pluck</option>
                  <option value="noise">Noise</option>
                </select>
              </label>
              <label>
                Mass
                <input id="input-mass" type="number" min="0.01" step="0.01" value="5" />
              </label>
              <label>
                Radius
                <input id="input-radius" type="number" min="1" step="1" value="6" />
              </label>
              <label>
                Pos X
                <input id="input-posx" type="number" step="1" value="160" />
              </label>
              <label>
                Pos Y
                <input id="input-posy" type="number" step="1" value="0" />
              </label>
              <label>
                Vel X
                <input id="input-velx" type="number" step="0.1" value="0" />
              </label>
              <label>
                Vel Y
                <input id="input-vely" type="number" step="0.1" value="1.6" />
              </label>
            </div>
            <div class="row">
              <button type="submit">Add Planet</button>
            </div>
          </form>
        </section>

        <section id="inspector-card" class="card" style="display:none;">
          <h2>Body Inspector</h2>
          <form id="form-inspector">
            <div class="grid">
              <label>
                Name
                <input id="ins-name" type="text" />
              </label>
              <label>
                Color
                <input id="ins-color" type="color" value="#51a7f9" />
              </label>
              <label>
                Mass
                <input id="ins-mass" type="number" min="0.01" step="0.01" />
              </label>
              <label>
                Radius
                <input id="ins-radius" type="number" min="1" step="1" />
              </label>
              <label>
                Vel X
                <input id="ins-velx" type="number" step="0.1" />
              </label>
              <label>
                Vel Y
                <input id="ins-vely" type="number" step="0.1" />
              </label>
            </div>
            <div class="row">
              <button id="ins-deselect" type="button">Deselect</button>
              <button id="ins-remove" class="danger" type="button">Remove</button>
            </div>
          </form>
        </section>

        <section class="card">
          <h2>Bodies</h2>
          <ul id="list-bodies" class="body-list"></ul>
        </section>
      </aside>
    </div>

    <script src="script.js"></script>
  </body>
  </html>
